services:
  joplin:
    image: "linuxserver/joplin:latest"
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    labels:
      createdBy: "bt_apps"
    ports:
      - "${HOST_IP}:${WEB_PORT}:3000"
      - "${HOST_IP}:${PANEL_APP_PORT_HTTPS}:3001"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - CUSTOM_USER=${CUSTOM_USER}
      - PASSWORD=${PASSWORD}
    volumes:
      - "joplin-config:/config"
    shm_size: ${SHM_SIZE}
    restart: always
    networks:
      - baota_net

networks:
  baota_net:
    external: true
    name: baota_net

volumes:
  joplin-config:
    name: joplin-config
